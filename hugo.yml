baseURL: 'https://www.nesono.com/'
languageCode: "en-us"
title: "nesono //"

canonifyURLs: true

params:
  profileMode:
    enabled: false
  disableSpecial1stPost: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowCodeCopyButtons: true
  meta:
    favicon: true

pagination:
  disableAliases: false

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: blog
      name: Blog
      url: /
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
